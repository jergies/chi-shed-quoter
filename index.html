<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHI Shed Quoter</title>
    <style>
        body { margin:0; font-family:Arial,sans-serif; background:#f4f4f4; }
        .header { background:#0066cc; color:white; padding:20px; text-align:center; font-size:1.5em; font-weight:bold; }
        .content { padding:20px; max-width:560px; margin:auto; background:white; box-shadow:0 0 15px rgba(0,0,0,0.1); }
        label { display:block; margin:12px 0 6px; font-weight:bold; }
        input, select, button { width:100%; padding:14px; margin:8px 0; border:1px solid #ccc; border-radius:8px; font-size:1.05em; }
        button { background:#0066cc; color:white; border:none; font-weight:bold; }
        .add-btn { background:#28a745; }
        .quote { background:#e6f7e6; padding:20px; border-radius:10px; margin-top:20px; line-height:1.6; }
    </style>
</head>
<body>
    <div class="header">Nucor / CHI Steel Shed Quoter</div>
    <div class="content">
        <label>Width (ft)</label><input type="number" id="width" value="40" onchange="updateAll()">
        <label>Length (ft)</label><input type="number" id="length" value="60" onchange="updateAll()">
        <label>Wall Height (ft)</label><input type="number" id="height" value="14" onchange="updateAll()">

        <label>Roof System</label>
        <select id="roofType" onchange="updateAll()">
            <option value="gable">Gabled (Standard)</option>
            <option value="single">Single Slope</option>
            <option value="asym">Asymmetrical</option>
        </select>

        <label>Slab Thickness</label>
        <select id="slabThick" onchange="updateAll()">
            <option value="4">4" Standard</option>
            <option value="6" selected>6" Recommended</option>
            <option value="8">8" Heavy Duty</option>
        </select>

        <label>Walkway / Sidewalk Width (ft) — 0 to disable</label>
        <input type="number" id="walkway" value="4" min="0" onchange="updateAll()">

        <label>Approach Length (ft) — 0 to disable</label>
        <input type="number" id="approach" value="20" min="0" onchange="updateAll()">

        <button onclick="getQuote()" style="margin:25px 0; padding:18px;">Get Full Quote</button>
        
        <div class="quote" id="quoteDisplay">
            Enter details and tap Get Full Quote
        </div>
    </div>

    <script>
        function getQuote() {
            const w = parseFloat(document.getElementById('width').value) || 40;
            const l = parseFloat(document.getElementById('length').value) || 60;
            const h = parseFloat(document.getElementById('height').value) || 14;
            const roof = document.getElementById('roofType').value;
            const slabThick = parseFloat(document.getElementById('slabThick').value);
            const walkwayW = parseFloat(document.getElementById('walkway').value) || 0;
            const approachL = parseFloat(document.getElementById('approach').value) || 0;

            const sqft = Math.round(w * l);
            let basePrice = Math.round(sqft * 32);

            if (roof === 'asym') basePrice = Math.round(basePrice * 1.18);
            if (roof === 'single') basePrice = Math.round(basePrice * 0.95);

            let total = basePrice;
            let summary = `<strong>${w}' × ${l}' × ${h}' ${roof.toUpperCase()} Roof Shed</strong><br><br>`;

            summary += `Floor Area: ${sqft} sq ft<br>`;
            summary += `Base Building: $${basePrice.toLocaleString()}<br>`;

            // Concrete
            const slabArea = (w + 4) * (l + 4); // extra for overhang
            const concreteCost = Math.round(slabArea * (slabThick / 12) * 7.5);
            total += concreteCost;
            summary += `Concrete Slab (${slabThick}" heavy spec): $${concreteCost.toLocaleString()}<br>`;

            // Walkway
            if (walkwayW > 0) {
                const walkwayCost = Math.round(2*(w + l) * walkwayW * 6);
                total += walkwayCost;
                summary += `Walkway/Sidewalk (${walkwayW}' wide): $${walkwayCost.toLocaleString()}<br>`;
            }

            // Approach
            if (approachL > 0) {
                const approachCost = Math.round(approachL * 12 * 6.5);
                total += approachCost;
                summary += `Approach (${approachL}' long): $${approachCost.toLocaleString()}<br>`;
            }

            summary += `<hr><strong style="color:#0066cc; font-size:1.4em;">Estimated Grand Total: $${total.toLocaleString()}</strong><br><br>`;
            summary += `<small><strong>Summary of Included Items:</strong><br>
            • Steel building kit + chosen roof<br>
            • Heavy spec concrete slab<br>
            • Walkways & approach as selected<br>
            • Ballpark pricing for 2026</small>`;

            document.getElementById('quoteDisplay').innerHTML = summary;
        }

        function updateAll() {}
    </script>
</body>
</html>
