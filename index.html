<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHI Shed Quoter</title>
    <style>
        body { margin:0; font-family:Arial,sans-serif; background:#f4f4f4; }
        .header { background:#0066cc; color:white; padding:20px; text-align:center; font-size:1.5em; font-weight:bold; }
        .content { padding:20px; max-width:560px; margin:auto; background:white; box-shadow:0 0 15px rgba(0,0,0,0.1); }
        label { display:block; margin:12px 0 6px; font-weight:bold; }
        input, select, button { width:100%; padding:14px; margin:8px 0; border:1px solid #ccc; border-radius:8px; font-size:1.05em; }
        button { background:#0066cc; color:white; border:none; font-weight:bold; }
        .settings-btn { background:#f39c12; color:white; padding:18px; margin:10px 0 20px 0; font-size:1.3em; font-weight:bold; border:none; border-radius:10px; width:100%; }
        .quote { background:#e6f7e6; padding:20px; border-radius:10px; margin-top:20px; line-height:1.6; }
    </style>
</head>
<body>
    <div class="header">Nucor / CHI Steel Shed Quoter</div>
    <div class="content">
        <button onclick="requestPassword()" class="settings-btn">⚙️ PRICE SETTINGS</button>

        <div id="settings" style="display:none; background:#f9f9f9; padding:15px; border-radius:8px; margin-bottom:15px;">
            <label>Base Price per sq ft</label><input type="number" id="baseRate" value="32" step="0.5">
            <label>Premium Overhead Door</label><input type="number" id="ohPrice" value="3400">
            <label>Premium Walk Door</label><input type="number" id="walkPrice" value="1250">
            <label>Window each</label><input type="number" id="winPrice" value="480">
            <label>Concrete per cu ft</label><input type="number" id="concRate" value="7.8" step="0.1">
        </div>

        <label>Width (ft)</label><input type="number" id="width" value="40" onchange="calculate()">
        <label>Length (ft)</label><input type="number" id="length" value="60" onchange="calculate()">
        <label>Wall Height (ft)</label><input type="number" id="height" value="14" onchange="calculate()">

        <label>Roof System</label>
        <select id="roofType" onchange="calculate()">
            <option value="gable">Gabled</option>
            <option value="single">Single Slope</option>
            <option value="asym">Asymmetrical</option>
        </select>

        <label>Roof Pitch (rise in 12)</label>
        <select id="pitch" onchange="calculate()">
            <option value="0.5">0.5:12</option><option value="1">1:12</option><option value="1.5">1.5:12</option>
            <option value="2">2:12</option><option value="2.5">2.5:12</option><option value="3" selected>3:12</option>
            <option value="3.5">3.5:12</option><option value="4">4:12</option><option value="4.5">4.5:12</option>
            <option value="5">5:12</option><option value="5.5">5.5:12</option><option value="6">6:12</option>
        </select>

        <label>Premium Overhead Doors</label><input type="number" id="ohDoors" value="2" min="0" onchange="calculate()">
        <label>Premium Walk Doors</label><input type="number" id="walkDoors" value="1" min="0" onchange="calculate()">
        <label>Windows</label><input type="number" id="windows" value="4" min="0" onchange="calculate()">

        <label><input type="checkbox" id="insWalls" checked onchange="calculate()"> Insulate Walls</label>
        <label><input type="checkbox" id="insRoof" checked onchange="calculate()"> Insulate Roof</label>

        <label>Slab Thickness (inches)</label>
        <select id="slabThick" onchange="calculate()">
            <option value="4">4"</option>
            <option value="6" selected>6" Recommended</option>
            <option value="8">8" Heavy</option>
        </select>

        <label>Footer Depth (inches)</label><input type="number" id="footerDepth" value="24" onchange="calculate()">
        <label>Concrete Miles</label><input type="number" id="concreteMiles" value="12" onchange="calculate()">

        <button onclick="calculate()" style="margin:25px 0; padding:18px; font-size:1.2em;">Get Full Quote</button>
        
        <div class="quote" id="quoteDisplay">Adjust any value above</div>
    </div>

    <script>
        const correctPassword = "chi2026";

        function requestPassword() {
            const entered = prompt("Enter Password to access Price Settings:");
            if (entered === correctPassword) {
                document.getElementById('settings').style.display = 'block';
            } else {
                alert("Incorrect password.");
            }
        }

        function calculate() {
            // Full calculation code here (same as before)
            const w = parseFloat(document.getElementById('width').value) || 40;
            const l = parseFloat(document.getElementById('length').value) || 60;
            const h = parseFloat(document.getElementById('height').value) || 14;
            const roofType = document.getElementById('roofType').value;
            const pitch = parseFloat(document.getElementById('pitch').value) || 3;

            const baseRate = parseFloat(document.getElementById('baseRate').value) || 32;
            const ohPrice = parseFloat(document.getElementById('ohPrice').value) || 3400;
            const walkPrice = parseFloat(document.getElementById('walkPrice').value) || 1250;
            const winPrice = parseFloat(document.getElementById('winPrice').value) || 480;
            const concRate = parseFloat(document.getElementById('concRate').value) || 7.8;

            const ohDoors = parseInt(document.getElementById('ohDoors').value) || 0;
            const walkDoors = parseInt(document.getElementById('walkDoors').value) || 0;
            const windows = parseInt(document.getElementById('windows').value) || 0;

            const insWalls = document.getElementById('insWalls').checked;
            const insRoof = document.getElementById('insRoof').checked;

            const slabThick = parseFloat(document.getElementById('slabThick').value) || 6;
            const footerDepth = parseFloat(document.getElementById('footerDepth').value) || 24;
            const miles = parseFloat(document.getElementById('concreteMiles').value) || 0;

            const sqft = Math.round(w * l);
            let basePrice = Math.round(sqft * baseRate);
            if (roofType === 'asym') basePrice = Math.round(basePrice * 1.18);
            if (roofType === 'single') basePrice = Math.round(basePrice * 0.95);
            basePrice = Math.round(basePrice * (1 + pitch / 24));

            let total = basePrice + (ohDoors * ohPrice) + (walkDoors * walkPrice) + (windows * winPrice);

            if (insWalls) total += Math.round(sqft * 4.5);
            if (insRoof) total += Math.round(sqft * 5.8);

            const slabCost = Math.round((w+4)*(l+4) * (slabThick/12) * concRate);
            const footerCost = Math.round(2*(w+l) * 1.5 * (footerDepth/12) * 8.8);
            const deliveryCost = Math.round(miles * 6.5);

            total += slabCost + footerCost + deliveryCost;

            document.getElementById('quoteDisplay').innerHTML = `
                <strong>${w}' × ${l}' × ${h}' ${roofType.toUpperCase()} • ${pitch}:12</strong><br><br>
                Floor Area: ${sqft} sq ft<br>
                Base Building: $${basePrice.toLocaleString()}<br><br>
                <strong style="color:#0066cc; font-size:1.4em;">Grand Total: $${Math.round(total).toLocaleString()}</strong>
            `;
        }

        window.onload = calculate;
    </script>
</body>
</html>
